openapi: 3.0.3
info:
  title: Order Service API
  version: 1.0.0
  description: |
    OpenAPI contract for order-service.
    This file is the source of truth for backend/frontend integration.
servers:
  - url: http://localhost:8080
    description: Local environment
tags:
  - name: Auth
    description: Public authentication endpoints
  - name: Orders
    description: Protected order lifecycle endpoints
paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login and get JWT token
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              admin:
                value:
                  username: admin
                  password: admin123
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /api/orders:
    post:
      tags: [Orders]
      summary: Create order
      operationId: createOrder
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Forbidden by role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /api/orders/{id}:
    get:
      tags: [Orders]
      summary: Get order by id
      operationId: getOrderById
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Forbidden by role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /api/orders/by-order-number/{orderNumber}:
    get:
      tags: [Orders]
      summary: Get order by order number
      operationId: getOrderByOrderNumber
      security:
        - bearerAuth: []
      parameters:
        - name: orderNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Forbidden by role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /api/orders/by-tracking-number/{trackingNumber}:
    get:
      tags: [Orders]
      summary: Get order by tracking number
      operationId: getOrderByTrackingNumber
      security:
        - bearerAuth: []
      parameters:
        - name: trackingNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Forbidden by role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /api/orders/customer/{customerId}:
    get:
      tags: [Orders]
      summary: List orders by customer id
      operationId: getOrdersByCustomerId
      security:
        - bearerAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Orders found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Forbidden by role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /api/orders/{id}/shipping-address:
    patch:
      tags: [Orders]
      summary: Update shipping address
      operationId: updateShippingAddress
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateShippingAddressRequest'
      responses:
        '200':
          description: Address updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Forbidden by role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /api/orders/{id}/ship:
    post:
      tags: [Orders]
      summary: Mark order as shipped
      operationId: shipOrder
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShipOrderRequest'
      responses:
        '200':
          description: Order shipped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Forbidden by role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /api/orders/{id}/complete:
    post:
      tags: [Orders]
      summary: Mark order as completed
      operationId: completeOrder
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Forbidden by role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /api/orders/{id}/cancel:
    post:
      tags: [Orders]
      summary: Cancel order
      operationId: cancelOrder
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelOrderRequest'
      responses:
        '200':
          description: Order cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Forbidden by role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /api/orders/{id}/return:
    post:
      tags: [Orders]
      summary: Request return
      operationId: returnOrder
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReasonRequest'
      responses:
        '200':
          description: Return requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Forbidden by role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /api/orders/{id}/refund:
    post:
      tags: [Orders]
      summary: Request refund
      operationId: refundOrder
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Refund requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Forbidden by role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    OrderId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64

  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: admin123

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresInSeconds:
          type: integer
          format: int64
          example: 86400
        username:
          type: string
          example: admin
        roles:
          type: array
          items:
            type: string
          example: [ADMIN]

    CreateOrderRequest:
      type: object
      required: [customerId, productId]
      properties:
        customerId:
          type: integer
          format: int64
        productId:
          type: integer
          format: int64
        paymentId:
          type: integer
          format: int64
        orderNumber:
          type: string
          description: Optional. Backend generates one when missing.
        invoiceNumber:
          type: string
        notes:
          type: string
        customerContact:
          $ref: '#/components/schemas/CustomerContactInput'
        financials:
          $ref: '#/components/schemas/FinancialsInput'
        shippingInfo:
          $ref: '#/components/schemas/ShippingInfoInput'

    UpdateShippingAddressRequest:
      type: object
      required: [newAddress]
      properties:
        newAddress:
          type: string
          example: Calle Nueva 123, Barcelona

    ShipOrderRequest:
      type: object
      required: [trackingNumber]
      properties:
        trackingNumber:
          type: string
          example: TRK-ES-999000111

    CancelOrderRequest:
      type: object
      properties:
        reason:
          type: string
          example: Customer requested cancellation

    ReasonRequest:
      type: object
      properties:
        reason:
          type: string
          example: Product damaged

    OrderResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        customerId:
          type: integer
          format: int64
        productId:
          type: integer
          format: int64
        paymentId:
          type: integer
          format: int64
        orderNumber:
          type: string
        invoiceNumber:
          type: string
        status:
          type: string
        notes:
          type: string
        customerContact:
          $ref: '#/components/schemas/CustomerContactOutput'
        financials:
          $ref: '#/components/schemas/FinancialsOutput'
        shippingInfo:
          $ref: '#/components/schemas/ShippingInfoOutput'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CustomerContactInput:
      type: object
      properties:
        customerName:
          type: string
        customerEmail:
          type: string
          format: email
        customerPhone:
          type: string

    CustomerContactOutput:
      type: object
      properties:
        customerName:
          type: string
        customerEmail:
          type: string
          format: email
        customerPhone:
          type: string

    FinancialsInput:
      type: object
      properties:
        price:
          type: number
          format: double
        discountAmount:
          type: number
          format: double
        taxAmount:
          type: number
          format: double
        shippingAmount:
          type: number
          format: double
        totalAmount:
          type: number
          format: double
        couponCode:
          type: string
        currency:
          type: string

    FinancialsOutput:
      type: object
      properties:
        price:
          type: number
          format: double
        discountAmount:
          type: number
          format: double
        taxAmount:
          type: number
          format: double
        shippingAmount:
          type: number
          format: double
        totalAmount:
          type: number
          format: double
        couponCode:
          type: string
        currency:
          type: string

    ShippingInfoInput:
      type: object
      properties:
        paymentMethod:
          type: string
        shippingMethod:
          type: string
        trackingNumber:
          type: string
        shippingAddress:
          type: string
        billingAddress:
          type: string

    ShippingInfoOutput:
      type: object
      properties:
        paymentMethod:
          type: string
        shippingMethod:
          type: string
        trackingNumber:
          type: string
        shippingAddress:
          type: string
        billingAddress:
          type: string

    ApiErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Validation error
        path:
          type: string
          example: /api/orders
