spring.datasource.url=jdbc:postgresql://localhost:5432/order_db
spring.datasource.username=user_ecommerce
spring.datasource.password=password_ecommerce
spring.datasource.driver-class-name=org.postgresql.Driver
spring.application.name=order-service

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Kafka configuration
spring.kafka.bootstrap-servers=localhost:19092,localhost:29092,localhost:39092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=10
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5
spring.kafka.producer.properties.delivery.timeout.ms=120000
spring.kafka.consumer.group-id=order-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.ecommerce.order.*
spring.kafka.listener.ack-mode=record
app.kafka.topics.order-events=ecommerce.order.events.v1
app.kafka.topics.dlq-suffix=.dlq
app.kafka.retry.max-attempts=3
app.kafka.retry.initial-interval-ms=1000
app.kafka.retry.multiplier=2.0
app.kafka.retry.max-interval-ms=10000

# Observability (KAN-24)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.kafka.enabled=true
logging.level.org.hibernate.SQL=WARN
logging.level.org.apache.kafka=WARN
logging.pattern.console={"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}","level":"%p","service":"${spring.application.name}","traceId":"%X{traceId:-}","correlationId":"%X{correlationId:-}","logger":"%logger{36}","message":"%replace(%msg){'\"','\\\"'}"}%n