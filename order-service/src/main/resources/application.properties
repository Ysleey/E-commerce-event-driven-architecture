spring.datasource.url=jdbc:postgresql://localhost:5432/order_db
spring.datasource.username=user_ecommerce
spring.datasource.password=password_ecommerce
spring.datasource.driver-class-name=org.postgresql.Driver
spring.application.name=order-service

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Kafka configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=10
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5
spring.kafka.producer.properties.delivery.timeout.ms=120000
app.kafka.topics.order-events=ecommerce.order.events.v1

# Observability (KAN-24)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level service=${spring.application.name} traceId=%X{traceId:-} correlationId=%X{correlationId:-} logger=%logger{36} msg=%msg%n