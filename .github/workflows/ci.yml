name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-order-service:
    name: Order service build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: order-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: order-service/pom.xml

      - name: Build and test order-service
        run: ./mvnw test

  backend-shipping-service:
    name: Shipping service build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shipping-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: shipping-service/pom.xml

      - name: Build and test shipping-service
        run: ./mvnw test

  frontend:
    name: Frontend quality gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Enforce minimum frontend coverage
        run: npm run coverage:check -- 0.3

      - name: Build frontend
        run: npm run build
