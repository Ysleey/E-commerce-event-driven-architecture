<div class="min-h-screen">
  <header class="sticky top-0 z-30 border-b border-slate-200/70 bg-white/80 backdrop-blur">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3 sm:px-6 lg:px-8">
      <a routerLink="/" class="flex items-center gap-3">
        <span class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-brand-600 font-display text-sm font-bold text-white shadow-soft">EC</span>
        <div>
          <p class="font-display text-sm uppercase tracking-[0.2em] text-brand-700">Portfolio Build</p>
          <p class="font-body text-base font-bold text-ink">E-commerce Angular</p>
        </div>
      </a>

      <nav class="hidden items-center gap-2 md:flex">
        <a
          *ngFor="let item of navItems"
          [routerLink]="item.path"
          [routerLinkActiveOptions]="{ exact: item.path === '/' }"
          routerLinkActive="bg-brand-100 text-brand-700"
          class="rounded-xl px-3 py-2 text-sm font-semibold text-slate-600 transition hover:bg-slate-100 hover:text-ink"
        >
          {{ item.label }}
        </a>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-8 sm:px-6 lg:px-8">
    <router-outlet></router-outlet>
  </main>
</div>
