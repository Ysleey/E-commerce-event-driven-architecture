<div class="min-h-screen">
  <header class="sticky top-0 z-30 border-b border-line/90 bg-surface/90 backdrop-blur">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3 sm:px-6 lg:px-8">
      <a routerLink="/" class="flex items-center gap-3">
        <span class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-brand-500 font-display text-sm font-bold text-ink shadow-soft">EC</span>
        <div>
          <p class="font-display text-sm uppercase tracking-[0.2em] text-brand-200">Portfolio Build</p>
          <p class="font-body text-base font-bold text-ink">E-commerce Angular</p>
        </div>
      </a>

      <nav class="hidden items-center gap-2 md:flex">
        <a
          *ngFor="let item of navItems"
          [routerLink]="item.path"
          [routerLinkActiveOptions]="{ exact: item.path === '/' }"
          routerLinkActive="bg-brand-900/70 text-brand-100"
          class="rounded-xl px-3 py-2 text-sm font-semibold text-muted transition hover:bg-card hover:text-ink"
        >
          {{ item.label }}
          <span
            *ngIf="item.path === '/carrito' && cart.totalItems() > 0"
            class="ml-2 inline-flex min-w-5 items-center justify-center rounded-full bg-brand-400 px-1.5 py-0.5 text-[10px] font-bold text-[#1e1510]"
          >
            {{ cart.totalItems() }}
          </span>
        </a>

        <div class="ml-2 flex items-center gap-2 rounded-xl border border-line bg-card px-3 py-2 text-xs font-semibold text-muted">
          <span class="h-2 w-2 rounded-full" [class.bg-success]="authSession.isAuthenticated()" [class.bg-line]="!authSession.isAuthenticated()"></span>
          <span *ngIf="authSession.isAuthenticated(); else loggedOut">{{ authSession.username() }}</span>
          <ng-template #loggedOut>
            <span>Sin sesion</span>
          </ng-template>
        </div>

        <button
          *ngIf="authSession.isAuthenticated()"
          type="button"
          (click)="logout()"
          class="rounded-xl border border-line px-3 py-2 text-xs font-bold text-muted transition hover:bg-card hover:text-ink"
        >
          Logout
        </button>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-8 sm:px-6 lg:px-8">
    <router-outlet></router-outlet>
  </main>
</div>
