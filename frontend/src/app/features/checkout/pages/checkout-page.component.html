<section class="space-y-6">
  <header class="rounded-3xl border border-line bg-card p-6 shadow-soft sm:p-8">
    <h1 class="font-display text-3xl font-bold text-ink sm:text-4xl">Checkout y confirmacion</h1>
    <p class="mt-3 text-sm text-muted">
      Conecta el carrito con `POST /api/orders` y confirma el pedido con feedback al usuario.
    </p>
  </header>

  <ng-container *ngIf="!cart.isEmpty(); else emptyCheckout">
    <section class="grid gap-6 lg:grid-cols-[1.3fr_0.9fr]">
      <form class="rounded-3xl border border-line bg-card p-5 shadow-soft" (ngSubmit)="submitOrder()">
        <div class="grid gap-4 md:grid-cols-2">
          <label class="block">
            <span class="mb-2 block text-xs font-semibold uppercase tracking-[0.12em] text-muted">Nombre</span>
            <input type="text" name="customerName" [(ngModel)]="customerName" class="w-full rounded-xl border border-line bg-surface px-4 py-3 text-sm text-ink outline-none focus:border-brand-400" />
          </label>
          <label class="block">
            <span class="mb-2 block text-xs font-semibold uppercase tracking-[0.12em] text-muted">Email</span>
            <input type="email" name="customerEmail" [(ngModel)]="customerEmail" class="w-full rounded-xl border border-line bg-surface px-4 py-3 text-sm text-ink outline-none focus:border-brand-400" />
          </label>
          <label class="block">
            <span class="mb-2 block text-xs font-semibold uppercase tracking-[0.12em] text-muted">Telefono</span>
            <input type="text" name="customerPhone" [(ngModel)]="customerPhone" class="w-full rounded-xl border border-line bg-surface px-4 py-3 text-sm text-ink outline-none focus:border-brand-400" />
          </label>
          <label class="block">
            <span class="mb-2 block text-xs font-semibold uppercase tracking-[0.12em] text-muted">Metodo de pago</span>
            <select name="paymentMethod" [(ngModel)]="paymentMethod" class="w-full rounded-xl border border-line bg-surface px-4 py-3 text-sm text-ink outline-none focus:border-brand-400">
              <option value="CARD">Tarjeta</option>
              <option value="TRANSFER">Transferencia</option>
            </select>
          </label>
          <label class="block md:col-span-2">
            <span class="mb-2 block text-xs font-semibold uppercase tracking-[0.12em] text-muted">Direccion de envio</span>
            <input type="text" name="shippingAddress" [(ngModel)]="shippingAddress" class="w-full rounded-xl border border-line bg-surface px-4 py-3 text-sm text-ink outline-none focus:border-brand-400" />
          </label>
          <label class="block md:col-span-2">
            <span class="mb-2 block text-xs font-semibold uppercase tracking-[0.12em] text-muted">Direccion de facturacion</span>
            <input type="text" name="billingAddress" [(ngModel)]="billingAddress" class="w-full rounded-xl border border-line bg-surface px-4 py-3 text-sm text-ink outline-none focus:border-brand-400" />
          </label>
          <label class="block">
            <span class="mb-2 block text-xs font-semibold uppercase tracking-[0.12em] text-muted">Metodo de envio</span>
            <select name="shippingMethod" [(ngModel)]="shippingMethod" class="w-full rounded-xl border border-line bg-surface px-4 py-3 text-sm text-ink outline-none focus:border-brand-400">
              <option value="STANDARD">Standard</option>
              <option value="EXPRESS">Express</option>
            </select>
          </label>
          <label class="block">
            <span class="mb-2 block text-xs font-semibold uppercase tracking-[0.12em] text-muted">Notas</span>
            <input type="text" name="notes" [(ngModel)]="notes" class="w-full rounded-xl border border-line bg-surface px-4 py-3 text-sm text-ink outline-none focus:border-brand-400" />
          </label>
        </div>

        <app-feedback-alert *ngIf="errorMessage" [message]="errorMessage" tone="error" />
        <app-feedback-alert *ngIf="successMessage" [message]="successMessage" tone="success" />

        <button type="submit" [disabled]="isSubmitting" class="mt-5 w-full rounded-xl bg-brand-400 px-4 py-3 text-sm font-bold text-[#1e1510] transition hover:bg-brand-300 disabled:bg-brand-700 disabled:text-brand-200">
          {{ isSubmitting ? 'Procesando pedido...' : 'Confirmar compra' }}
        </button>
      </form>

      <aside class="space-y-4 rounded-3xl border border-line bg-card p-5 shadow-soft">
        <app-price-breakdown
          title="Resumen de pago"
          [items]="cart.totalItems()"
          [subtotal]="cart.subtotal()"
          [tax]="cart.tax()"
          [shipping]="cart.shipping()"
          [total]="cart.total()"
        />

        <div *ngIf="createdOrder" class="rounded-2xl border border-brand-700/60 bg-brand-900/30 p-4">
          <p class="text-xs font-bold uppercase tracking-[0.12em] text-brand-100">Pedido creado</p>
          <p class="mt-1 text-sm text-ink">{{ createdOrder.orderNumber }} - {{ createdOrder.status }}</p>
          <p class="text-xs text-muted">Tracking: {{ createdOrder.shippingInfo.trackingNumber }}</p>
        </div>

        <a routerLink="/carrito" class="block text-center text-xs font-semibold uppercase tracking-[0.12em] text-brand-200 hover:text-brand-100">
          Volver al carrito
        </a>
      </aside>
    </section>
  </ng-container>

  <ng-template #emptyCheckout>
    <app-empty-state-card
      title="Sin productos para checkout"
      description="Agrega productos en el catalogo antes de confirmar compra."
      actionLabel="Ir al catalogo"
      actionLink="/catalogo"
    />
  </ng-template>
</section>
