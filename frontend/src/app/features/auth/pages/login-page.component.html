<section class="mx-auto max-w-lg rounded-3xl border border-line bg-card p-6 shadow-soft sm:p-8">
  <h1 class="mt-4 font-display text-3xl font-bold text-ink">Login JWT</h1>
  <p class="mt-3 text-sm leading-relaxed text-muted">
    Este formulario consume el backend real en <code>/api/v1/auth/login</code>, guarda sesion y habilita rutas protegidas.
  </p>

  <form class="mt-6 space-y-4" (ngSubmit)="submit()">
    <label class="block">
      <span class="mb-2 block text-sm font-semibold text-muted">Usuario</span>
      <input
        type="text"
        name="username"
        [(ngModel)]="username"
        class="w-full rounded-xl border border-line bg-surface px-4 py-3 text-sm text-ink outline-none transition focus:border-brand-400 focus:ring-2 focus:ring-brand-900/50"
      />
    </label>

    <label class="block">
      <span class="mb-2 block text-sm font-semibold text-muted">Password</span>
      <input
        type="password"
        name="password"
        [(ngModel)]="password"
        class="w-full rounded-xl border border-line bg-surface px-4 py-3 text-sm text-ink outline-none transition focus:border-brand-400 focus:ring-2 focus:ring-brand-900/50"
      />
    </label>

    <p *ngIf="infoMessage" class="rounded-xl border border-brand-700/60 bg-brand-900/35 px-3 py-2 text-sm font-semibold text-brand-100">
      {{ infoMessage }}
    </p>

    <p *ngIf="validationMessage" class="rounded-xl border border-brand-500/60 bg-brand-900/30 px-3 py-2 text-sm font-semibold text-brand-200">
      {{ validationMessage }}
    </p>

    <p *ngIf="errorMessage" class="rounded-xl border border-danger/60 bg-danger/15 px-3 py-2 text-sm font-semibold text-[#ffc6be]">
      {{ errorMessage }}
    </p>

    <button
      type="submit"
      [disabled]="isSubmitting"
      class="w-full rounded-xl bg-brand-400 px-5 py-3 text-sm font-bold text-[#1e1510] transition hover:bg-brand-300 disabled:cursor-not-allowed disabled:bg-brand-700 disabled:text-brand-200"
    >
      {{ isSubmitting ? 'Iniciando sesion...' : 'Iniciar sesion' }}
    </button>
  </form>

  <p class="mt-4 text-xs text-muted/80">
    Usuario demo: <strong>admin/admin123</strong>. Puedes usar tambien sales, logistics o customer.
  </p>

  <div class="mt-6 border-t border-line pt-4 text-sm">
    <a routerLink="/" class="font-semibold text-brand-200 hover:text-brand-100">Volver al inicio</a>
  </div>
</section>
