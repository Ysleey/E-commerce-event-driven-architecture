<section class="mx-auto max-w-lg rounded-3xl border border-slate-200 bg-white p-6 shadow-soft sm:p-8">
  <p class="inline-flex rounded-full bg-brand-100 px-3 py-1 text-xs font-bold uppercase tracking-[0.15em] text-brand-700">
    KAN-19 + KAN-30
  </p>
  <h1 class="mt-4 font-display text-3xl font-bold text-ink">Login JWT</h1>
  <p class="mt-3 text-sm leading-relaxed text-slate-600">
    Este formulario consume el backend real en <code>/api/v1/auth/login</code>, guarda sesion y habilita rutas protegidas.
  </p>

  <form class="mt-6 space-y-4" (ngSubmit)="submit()">
    <label class="block">
      <span class="mb-2 block text-sm font-semibold text-slate-700">Usuario</span>
      <input
        type="text"
        name="username"
        [(ngModel)]="username"
        class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm outline-none transition focus:border-brand-500 focus:ring-2 focus:ring-brand-200"
      />
    </label>

    <label class="block">
      <span class="mb-2 block text-sm font-semibold text-slate-700">Password</span>
      <input
        type="password"
        name="password"
        [(ngModel)]="password"
        class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm outline-none transition focus:border-brand-500 focus:ring-2 focus:ring-brand-200"
      />
    </label>

    <p *ngIf="infoMessage" class="rounded-xl border border-sky-300 bg-sky-50 px-3 py-2 text-sm font-semibold text-sky-700">
      {{ infoMessage }}
    </p>

    <p *ngIf="validationMessage" class="rounded-xl border border-amber-300 bg-amber-50 px-3 py-2 text-sm font-semibold text-amber-700">
      {{ validationMessage }}
    </p>

    <p *ngIf="errorMessage" class="rounded-xl border border-rose-300 bg-rose-50 px-3 py-2 text-sm font-semibold text-rose-700">
      {{ errorMessage }}
    </p>

    <button
      type="submit"
      [disabled]="isSubmitting"
      class="w-full rounded-xl bg-brand-600 px-5 py-3 text-sm font-bold text-white transition hover:bg-brand-700 disabled:cursor-not-allowed disabled:bg-brand-300"
    >
      {{ isSubmitting ? 'Iniciando sesion...' : 'Iniciar sesion' }}
    </button>
  </form>

  <p class="mt-4 text-xs text-slate-500">
    Usuario demo: <strong>admin/admin123</strong>. Puedes usar tambien sales, logistics o customer.
  </p>

  <div class="mt-6 border-t border-slate-200 pt-4 text-sm">
    <a routerLink="/" class="font-semibold text-brand-700 hover:text-brand-800">Volver al inicio</a>
  </div>
</section>
