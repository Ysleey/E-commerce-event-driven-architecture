server.port=8082
spring.application.name=shipping-service

spring.datasource.url=jdbc:postgresql://localhost:5432/shipping_db
spring.datasource.username=user_ecommerce
spring.datasource.password=password_ecommerce
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.kafka.bootstrap-servers=localhost:19092,localhost:29092,localhost:39092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=10
spring.kafka.consumer.group-id=shipping-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.listener.ack-mode=record

app.kafka.topics.order-events=ecommerce.order.events.v1
app.kafka.topics.shipping-events=ecommerce.shipping.events.v1
app.kafka.consumer.name=shipping-order-events-consumer-v1

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
